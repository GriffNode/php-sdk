name: Generate SDK
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['openapi.yaml', 'openapitools.json', '.github/workflows/generate.yml']
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate (php)
        run: |
          docker run --rm -v "${{ github.workspace }}:/local" \
            openapitools/openapi-generator-cli:v7.10.0 \
            generate -i /local/openapi.yaml -g php -o /local \
            --skip-validate-spec \
            --additional-properties=invokerPackage=GriffNode,composerPackageName=griffnode/php-sdk,artifactVersion=1.0.0,artifactUrl=https://griffnode.com,developerOrganization=GriffNode,developerOrganizationUrl=https://griffnode.com,licenseName=Apache-2.0
      - name: Commit regenerated SDK
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: regenerate SDK from openapi.yaml"
          git pull --rebase --autostash
          git push
